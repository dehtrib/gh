<script>
  const radios = document.querySelectorAll('.radio-group input[type="radio"]');

  radios.forEach(radio => {
    radio.addEventListener('change', () => {
      const url = radio.dataset.url; // get the page URL
      if (url) {
        window.location.href = url;   // navigate
      }
    });
  });

  // Only add home link if we are NOT on index.html
  if (!window.location.pathname.endsWith('index.html') && !window.location.pathname.endsWith('/')) {
    const container = document.createElement('a');
    container.href = 'index.html';

    const h1 = document.querySelector('h1');
    // const h2 = document.querySelector('h2');

    // Wrap the h1 and h2 in the link
    h1.parentNode.insertBefore(container, h1);
    container.appendChild(h1);
    // container.appendChild(h2);
  }
</script>
